<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fortnite2</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; }
        canvas { display: block; }

        /* UI Overlay */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        #player-stats {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 8px;
            color: white; font-weight: bold; font-size: 1.2rem;
            border: 2px solid #333;
        }
        #hp-bar-container { width: 200px; height: 20px; background: #555; margin-top: 5px; border-radius: 4px; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: #4ade80; transition: width 0.2s; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            mix-blend-mode: difference;
        }

        #hit-marker {
            position: absolute; top: 50%; left: 50%;
            color: red; font-weight: bold; font-size: 1.5rem;
            transform: translate(-50%, -50%); display: none;
        }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: auto; z-index: 10;
        }
        #game-over h1 { font-size: 5rem; color: #ef4444; margin: 0; text-transform: uppercase; }
        button { margin-top: 20px; background: #4ade80; color: #0f172a; border: none; padding: 15px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 8px; cursor: pointer; }

        .enemy-hp {
            position: absolute; width: 50px; height: 8px; background: #ef4444;
            border: 1px solid black; transform: translate(-50%, -100%); display: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <div id="player-stats">
            <div>HEALTH: <span id="hp-text">100</span></div>
            <div id="hp-bar-container"><div id="hp-bar"></div></div>
            <div style="margin-top: 10px; color: #60a5fa;">AMMO: <span id="ammo-text">30</span></div>
            <div style="margin-top: 5px; font-size: 0.9rem; color: #ccc;">WASD: Move | Arrows: Look | Space: Shoot</div>
        </div>
        <div id="crosshair"></div>
        <div id="hit-marker">X</div>
    </div>

    <div id="enemy-ui-container"></div>

    <div id="game-over">
        <h1 id="end-title">YOU DIED</h1>
        <button onclick="location.reload()">Restart Game</button>
    </div>

    <script>
        // --- 1. SETUP THREE.JS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Player setup
        const player = new THREE.Group();
        player.position.set(0, 2, 0); // Eye level
        player.add(camera);
        scene.add(player);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- 2. MAP GENERATION (Trees, Cover, Buildings) ---
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x228B22 }); // Grass
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const collidables = [];

        function createBox(x, z, w, h, d, color) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color }));
            mesh.position.set(x, h/2, z);
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            collidables.push(mesh);
        }

        function createTree(x, z) {
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 3), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
            trunk.position.set(x, 1.5, z);
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(3, 5, 8), new THREE.MeshStandardMaterial({ color: 0x006400 }));
            leaves.position.set(x, 4.5, z);
            scene.add(trunk); scene.add(leaves);
            collidables.push(trunk);
        }

        // Generate environment
        for (let i = 0; i < 30; i++) {
            createTree((Math.random() - 0.5) * 180, (Math.random() - 0.5) * 180);
        }
        // Small buildings/cover
        createBox(10, -10, 5, 4, 5, 0x888888);
        createBox(-15, 20, 8, 5, 4, 0x888888);
        createBox(25, 15, 4, 3, 8, 0x888888);

        // --- 3. ITEMS (Loot) ---
        const items = [];
        function createLoot(x, z, type) {
            const isHealth = type === 'health';
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshStandardMaterial({ color: isHealth ? 0x4ade80 : 0x60a5fa, emissive: isHealth ? 0x113311 : 0x111133 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 0.5, z);
            scene.add(mesh);
            items.push({ mesh, type, active: true });
        }

        createLoot(10, -8, 'health');
        createLoot(-15, 22, 'ammo');
        createLoot(5, 5, 'ammo');

        // --- 4. DETAILED AI ENEMIES ---
        const enemies = [];
        const uiContainer = document.getElementById('enemy-ui-container');

        function createEnemy(x, z) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0xef4444 }); // Red enemies
            
            // Body (Rectangular prism)
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.5), mat);
            body.position.y = 1.75;
            // Head (Sphere)
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), mat);
            head.position.y = 2.9;
            // Arms
            const armL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.2, 0.3), mat);
            armL.position.set(-0.7, 1.75, 0);
            const armR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.2, 0.3), mat);
            armR.position.set(0.7, 1.75, 0);
            // Legs
            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.5, 0.4), mat);
            legL.position.set(-0.25, 0.75, 0);
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.5, 0.4), mat);
            legR.position.set(0.25, 0.75, 0);

            group.add(body, head, armL, armR, legL, legR);
            group.position.set(x, 0, z);
            scene.add(group);

            // Create HTML Health Bar
            const hpBar = document.createElement('div');
            hpBar.className = 'enemy-hp';
            uiContainer.appendChild(hpBar);

            enemies.push({ group, hp: 100, maxHp: 100, hpBar, active: true });
        }

        // Spawn 8 enemies (20 can severely lag a browser without optimization)
        for (let i = 0; i < 8; i++) {
            createEnemy((Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100 - 20);
        }

        // --- 5. GAME STATE & CONTROLS ---
        let pState = { hp: 100, ammo: 30, dead: false };
        const keys = { w: false, a: false, s: false, d: false, ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false };
        
        let pitch = 0; // Up/down angle
        let yaw = 0;   // Left/right angle

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            if (e.code === 'Space' && !pState.dead) shoot();
        });
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        const raycaster = new THREE.Raycaster();

        function shoot() {
            if (pState.ammo <= 0) return;
            pState.ammo--;
            document.getElementById('ammo-text').innerText = pState.ammo;

            // Raycast from center of camera
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            
            // Check enemies
            for (let i = 0; i < enemies.length; i++) {
                if (!enemies[i].active) continue;
                // Check intersection with any part of the enemy group
                const intersects = raycaster.intersectObjects(enemies[i].group.children);
                if (intersects.length > 0) {
                    enemies[i].hp -= 25;
                    showHitMarker();
                    if (enemies[i].hp <= 0) {
                        enemies[i].active = false;
                        scene.remove(enemies[i].group);
                        enemies[i].hpBar.style.display = 'none';
                        checkWin();
                    }
                    break; // Only hit one enemy per shot
                }
            }
        }

        function showHitMarker() {
            const marker = document.getElementById('hit-marker');
            marker.style.display = 'block';
            setTimeout(() => marker.style.display = 'none', 100);
        }

        function takeDamage(amt) {
            if (pState.dead) return;
            pState.hp -= amt;
            if (pState.hp < 0) pState.hp = 0;
            document.getElementById('hp-text').innerText = pState.hp;
            document.getElementById('hp-bar').style.width = pState.hp + '%';
            if (pState.hp <= 0) {
                pState.dead = true;
                document.getElementById('game-over').style.display = 'flex';
            }
        }

        function checkWin() {
            const aliveCount = enemies.filter(e => e.active).length;
            if (aliveCount === 0) {
                pState.dead = true;
                document.getElementById('end-title').innerText = "VICTORY ROYALE";
                document.getElementById('end-title').style.color = "#4ade80";
                document.getElementById('game-over').style.display = 'flex';
            }
        }

        // --- 6. MAIN LOOP ---
        const clock = new THREE.Clock();

        function update() {
            if (pState.dead) return;
            const dt = clock.getDelta();

            // --- CAMERA ROTATION (Arrow Keys) ---
            const rotSpeed = 2.0 * dt;
            if (keys.ArrowLeft) yaw += rotSpeed;
            if (keys.ArrowRight) yaw -= rotSpeed;
            if (keys.ArrowUp) pitch += rotSpeed;
            if (keys.ArrowDown) pitch -= rotSpeed;

            // Clamp pitch so you can't break your neck looking too far up/down
            pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));

            // Apply rotation: Player group handles left/right (yaw), camera handles up/down (pitch)
            player.rotation.y = yaw;
            camera.rotation.x = pitch;

            // --- MOVEMENT (WASD) ---
            const moveSpeed = 10 * dt;
            const moveDir = new THREE.Vector3(0, 0, 0);
            
            if (keys.w) moveDir.z -= 1;
            if (keys.s) moveDir.z += 1;
            if (keys.a) moveDir.x -= 1;
            if (keys.d) moveDir.x += 1;

            moveDir.normalize().multiplyScalar(moveSpeed);
            
            // Apply moveDir relative to player rotation
            moveDir.applyEuler(new THREE.Euler(0, player.rotation.y, 0));
            player.position.add(moveDir);

            // Restrict bounds so you don't fall off map
            player.position.x = Math.max(-95, Math.min(95, player.position.x));
            player.position.z = Math.max(-95, Math.min(95, player.position.z));

            // --- LOOT LOGIC ---
            items.forEach(item => {
                if (!item.active) return;
                item.mesh.rotation.y += dt; // Spin
                
                // Pick up radius
                if (player.position.distanceTo(item.mesh.position) < 2.5) {
                    if (item.type === 'health' && pState.hp < 100) {
                        pState.hp = Math.min(100, pState.hp + 50);
                        document.getElementById('hp-text').innerText = pState.hp;
                        document.getElementById('hp-bar').style.width = pState.hp + '%';
                        item.active = false;
                        scene.remove(item.mesh);
                    } else if (item.type === 'ammo') {
                        pState.ammo += 30;
                        document.getElementById('ammo-text').innerText = pState.ammo;
                        item.active = false;
                        scene.remove(item.mesh);
                    }
                }
            });

            // --- ENEMY LOGIC & UI ---
            enemies.forEach(e => {
                if (!e.active) return;

                // Simple AI: Turn towards player and slowly walk
                const dx = player.position.x - e.group.position.x;
                const dz = player.position.z - e.group.position.z;
                const angleToPlayer = Math.atan2(dx, dz);
                e.group.rotation.y = angleToPlayer;

                const dist = e.group.position.distanceTo(player.position);
                if (dist > 5 && dist < 40) {
                    // Move forward
                    e.group.position.x += Math.sin(angleToPlayer) * 3 * dt;
                    e.group.position.z += Math.cos(angleToPlayer) * 3 * dt;
                } else if (dist <= 5) {
                    // Melee Damage player if close
                    if (Math.random() < 0.05) takeDamage(5); 
                }

                // UI Health Bar Projection
                const headPos = new THREE.Vector3().setFromMatrixPosition(e.group.children[1].matrixWorld);
                headPos.y += 1; // Above head
                
                // Project 3D position to 2D screen space
                const screenPos = headPos.clone().project(camera);
                
                // Check if enemy is behind camera
                if (screenPos.z > 1) {
                    e.hpBar.style.display = 'none';
                } else {
                    e.hpBar.style.display = 'block';
                    const x = (screenPos.x * .5 + .5) * window.innerWidth;
                    const y = (-(screenPos.y * .5) + .5) * window.innerHeight;
                    e.hpBar.style.left = `${x}px`;
                    e.hpBar.style.top = `${y}px`;
                    e.hpBar.style.width = `${(e.hp / e.maxHp) * 50}px`; // Scale bar width
                }
            });

            renderer.render(scene, camera);
        }

        renderer.setAnimationLoop(update);

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
